name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Stoic AgentOS
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for reporting a bug! 🐛

        Please fill out the sections below so we can reproduce and fix the issue as quickly as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of Stoic AgentOS is affected?
      options:
        - Dashboard (Frontend)
        - API
        - TypeScript SDK (npm)
        - Python SDK (PyPI)
        - MCP Server
        - Supabase / Database
        - CI / GitHub Actions
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you running?
      placeholder: "e.g., Windows 11, macOS 14.5, Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "e.g., v20.11.0"
    validations:
      required: false

  - type: input
    id: sdk-version
    attributes:
      label: SDK Version
      description: Version of `stoic-agentos-sdk` (npm) or `stoic-agentos` (PyPI), if applicable.
      placeholder: "e.g., 2.0.0"
    validations:
      required: false

  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots / Logs
      description: |
        If applicable, add screenshots or paste relevant log output.
        Tip: You can drag and drop images directly into this field.
      placeholder: Paste logs or drag images here...
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the problem (configuration, workarounds tried, related issues, etc.).
      placeholder: Anything else we should know?
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to make sure this is not a duplicate.
          required: true
        - label: I have included all the information requested above.
          required: true
